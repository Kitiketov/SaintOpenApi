<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
</head>
<body>

    <h2>Login with Telegram</h2>

    <script async src="https://telegram.org/js/telegram-widget.js?22"
            data-telegram-login="{{ bot_name }}"
            data-size="large"
            data-userpic="false"
            data-request-access="write"
            data-auth-url="{{ auth_url }}">
    </script>

</body>
</html>
